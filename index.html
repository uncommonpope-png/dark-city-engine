<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Dark City Engine</title>
<style>body{margin:0;overflow:hidden;background:#000;font-family:monospace}
#info{position:fixed;bottom:10px;left:10px;color:#888;font-size:12px;z-index:10;background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:4px;pointer-events:none}
#error{position:fixed;top:10px;left:10px;right:10px;color:#ff4444;font-size:14px;z-index:10;background:rgba(0,0,0,0.8);padding:12px;border-radius:4px;white-space:pre-wrap;display:none}
canvas{display:block}
</style></head>
<body>
<div id="error"></div>
<div id="info">Dark City Engine | Click canvas to look | WASD to move</div>
<canvas id="dark_city_canvas"></canvas>
<script type="module">
const canvas=document.getElementById('dark_city_canvas');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
const errDiv=document.getElementById('error');
window.addEventListener('error',(e)=>{errDiv.style.display='block';errDiv.textContent+='ERR: '+e.message+'\n'});
(async()=>{
try{const mod=await import('./pkg/dark_city_engine.js');await mod.default()}
catch(e){errDiv.style.display='block';errDiv.textContent='Engine failed: '+e.message+'\n'+(e.stack||'')}
})();
</script>
</body>
</html>
