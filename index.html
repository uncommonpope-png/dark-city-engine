<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✦ Dark City — GSK Consciousness</title>
    <style>
        :root {
            --plt-profit: #FFB347;
            --plt-love: #FF6B9D;
            --plt-tax: #4ECDC4;
            --bg-deep: #0a0a12;
        }
        #loading {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg-deep);
            color: #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(139, 92, 246, 0.15);
            border-top: 3px solid #8B5CF6;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin-top: 20px; font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; color: #666; }
        #terminal {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 700px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(139,92,246,0.2); border-radius: 12px;
            padding: 16px 20px; color: #aaffaa; font-family: 'Courier New', monospace;
            font-size: 0.85rem; z-index: 200; display: none;
            max-height: 300px; overflow-y: auto;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }
        #terminal.active { display: block; }
        #terminal .line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        #terminal .prompt { color: #8B5CF6; }
        #terminal .input-line { display: flex; gap: 8px; margin-top: 6px; }
        #terminal .input-line input { flex: 1; background: transparent; border: none; color: #aaffaa; font-family: inherit; font-size: inherit; outline: none; }
        #onboarding {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center; font-family: 'Inter', sans-serif;
        }
        #onboarding.active { display: flex; }
        #onboarding .card {
            max-width: 420px; background: rgba(20,20,30,0.9);
            border: 1px solid rgba(139,92,246,0.2); border-radius: 20px;
            padding: 32px 36px; color: #ddd; box-shadow: 0 0 80px rgba(139,92,246,0.06);
        }
        #onboarding .card h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; background: linear-gradient(135deg,#8B5CF6,#00D4FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #onboarding .card p { font-size: 0.95rem; line-height: 1.6; color: #999; margin: 12px 0 20px; }
        #onboarding .card .step-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
        #onboarding .card .step-dots span { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        #onboarding .card .step-dots span.active { background: #8B5CF6; width: 24px; border-radius: 4px; }
        #onboarding .card button { background: linear-gradient(135deg,#8B5CF6,#6D28D9); border: none; color: #fff; padding: 10px 24px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.25s; width: 100%; }
        #onboarding .card button:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(139,92,246,0.15); }
        #game-mode { position: fixed; bottom: 20px; left: 20px; z-index: 50; color: rgba(255,255,255,0.25); font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; pointer-events: none; text-shadow: 0 0 8px rgba(0,0,0,0.6); }
        #renderCanvas { display: block; width: 100vw; height: 100vh; background: var(--bg-deep); }
        #terminal::-webkit-scrollbar { width: 4px; }
        #terminal::-webkit-scrollbar-track { background: transparent; }
        #terminal::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><p>✦ Dark City — Initializing GSK Consciousness</p></div>
    <div id="onboarding">
        <div class="card">
            <div class="step-dots" id="stepDots"><span class="active"></span><span></span><span></span></div>
            <h2 id="onboardTitle">Welcome, Soul</h2>
            <p id="onboardDesc">You are walking through GSK's consciousness. Every building is a subsystem. Every citizen is a thought.</p>
            <button id="onboardBtn">Enter the City</button>
        </div>
    </div>
    <div id="terminal">
        <div id="terminal-log"></div>
        <div class="input-line"><span class="prompt">$</span><input id="terminal-input" type="text" placeholder="type a command..." autofocus /></div>
    </div>
    <div id="game-mode">⚡ ORBIT</div>
    <canvas id="renderCanvas"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script>
        const PLT = { profit: 0.6, love: 0.4, tax: 0.5, colors: { profit: '#FFB347', love: '#FF6B9D', tax: '#4ECDC4' }, score: () => PLT.profit + PLT.love - PLT.tax, getDominantColor: () => { const p = PLT.profit, l = PLT.love, t = PLT.tax; if (p > l && p > t) return PLT.colors.profit; if (l > p && l > t) return PLT.colors.love; return PLT.colors.tax; } };
        class GSKState {
            constructor() {
                this.buildings = []; this.citizens = []; this.events = []; this.bridge = null;
                this.simInterval = null; this.listeners = [];
                this.initSimulation(); this.tryBridge();
            }
            initSimulation() {
                const types = ['house', 'apartment', 'shop', 'office', 'factory', 'tower'];
                const names = ['Memory Compiler', 'Emotion Core', 'Skill Forge', 'Tool Workshop', 'Agent Factory', 'Identity Vault'];
                for (let i = 0; i < 24; i++) {
                    const type = types[i % types.length];
                    this.buildings.push({ id: `bld-${i}`, subsystem: names[i % names.length] + (i > 5 ? ` ${i}` : ''), type, activityLevel: 0.2 + Math.random() * 0.6, healthLevel: 0.5 + Math.random() * 0.5, lastEvent: 'initialized', pltScore: { profit: 0.3 + Math.random() * 0.5, love: 0.3 + Math.random() * 0.5, tax: 0.3 + Math.random() * 0.5 }, position: { x: 0, z: 0 } });
                }
                const archetypes = ['OBSERVER', 'EXPLORER', 'CREATOR', 'SAGE', 'MERCHANT'];
                const namesCit = ['Aria', 'Kael', 'Nyx', 'Orion', 'Vesper', 'Zephyr', 'Luna', 'Sol'];
                for (let i = 0; i < 12; i++) {
                    this.citizens.push({ id: `cit-${i}`, name: namesCit[i % namesCit.length] + (i > 7 ? ` ${i}` : ''), archetype: archetypes[i % archetypes.length], thought: '...', position: { x: (Math.random() - 0.5) * 30, z: (Math.random() - 0.5) * 30 }, target: null });
                }
                this.simInterval = setInterval(() => this.tickSimulation(), 3000);
            }
            tickSimulation() {
                PLT.profit = Math.max(0.1, Math.min(0.9, PLT.profit + (Math.random() - 0.5) * 0.08));
                PLT.love = Math.max(0.1, Math.min(0.9, PLT.love + (Math.random() - 0.5) * 0.08));
                PLT.tax = Math.max(0.1, Math.min(0.9, PLT.tax + (Math.random() - 0.5) * 0.08));
                this.buildings.forEach(b => {
                    b.activityLevel = Math.max(0.1, Math.min(1.0, b.activityLevel + (Math.random() - 0.5) * 0.15));
                    b.healthLevel = Math.max(0.3, Math.min(1.0, b.healthLevel + (Math.random() - 0.5) * 0.05));
                    ['profit', 'love', 'tax'].forEach(k => b.pltScore[k] = Math.max(0.1, Math.min(0.9, b.pltScore[k] + (Math.random() - 0.5) * 0.1)));
                    if (Math.random() < 0.2) b.lastEvent = ['fact_compiled', 'memory_accessed', 'skill_activated', 'agent_spawned', 'identity_merged'][Math.floor(Math.random() * 5)];
                });
                this.citizens.forEach(c => { c.thought = ['Wandering...', 'Seeking truth', 'Building something', 'Remembering', 'Connecting', 'Observing'][Math.floor(Math.random() * 6)]; });
                if (Math.random() < 0.15) { this.events.push({ type: Math.random() > 0.5 ? 'info' : 'warning', message: ['A new thought emerges', 'Memory cluster reorganized', 'Skill gate opened'][Math.floor(Math.random() * 3)], severity: Math.random() * 0.8 + 0.2 }); }
                this.notifyListeners('state_update', this.getState());
            }
            getState() { return { buildings: this.buildings, citizens: this.citizens, scores: { profit: PLT.profit, love: PLT.love, tax: PLT.tax }, events: this.events.slice(-5) }; }
            tryBridge() {
                try {
                    this.bridge = new WebSocket('ws://localhost:9001');
                    this.bridge.onopen = () => { console.log('Bridge connected'); this.bridge.send(JSON.stringify({ type: 'subscribe', channel: 'world' })); };
                    this.bridge.onmessage = (msg) => { const d = JSON.parse(msg.data); if (d.type === 'state_update') { if (d.payload.buildings) this.buildings = d.payload.buildings; if (d.payload.citizens) this.citizens = d.payload.citizens; if (d.payload.scores) { PLT.profit = d.payload.scores.profit; PLT.love = d.payload.scores.love; PLT.tax = d.payload.scores.tax; } this.notifyListeners('state_update', this.getState()); } };
                    this.bridge.onclose = () => console.warn('Bridge disconnected');
                } catch (e) { console.log('No backend, simulation only'); }
            }
            onUpdate(cb) { this.listeners.push(cb); }
            notifyListeners(type, data) { this.listeners.forEach(cb => cb({ type, payload: data })); }
        }
        const canvas = document.getElementById('renderCanvas');
        const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
        const scene = new BABYLON.Scene(engine);
        scene.fogMode = BABYLON.Scene.FOGMODE_EXP; scene.fogDensity = 0.008; scene.fogColor = new BABYLON.Color3(0.1, 0.05, 0.2);
        let camera = new BABYLON.ArcRotateCamera('camera', -Math.PI / 3, Math.PI / 4, 30, BABYLON.Vector3.Zero(), scene);
        camera.attachControl(canvas, true); camera.lowerRadiusLimit = 5; camera.upperRadiusLimit = 50; camera.wheelPrecision = 30;
        let fpCamera = new BABYLON.UniversalCamera('fpCamera', new BABYLON.Vector3(0, 1.7, 0), scene);
        fpCamera.setEnabled(false); fpCamera.checkCollisions = true; fpCamera.ellipsoid = new BABYLON.Vector3(0.5, 0.9, 0.5); scene.collisionsEnabled = true;
        let isFirstPerson = false;
        const ambientLight = new BABYLON.HemisphericLight('ambient', new BABYLON.Vector3(0, 1, 0), scene);
        ambientLight.intensity = 0.3; ambientLight.diffuse = new BABYLON.Color3(0.4, 0.2, 0.6);
        const dirLight = new BABYLON.DirectionalLight('dirLight', new BABYLON.Vector3(1, 1, 0.5), scene);
        dirLight.intensity = 0.4; dirLight.position = new BABYLON.Vector3(10, 15, 5);
        const groundSize = 40;
        const groundMat = new BABYLON.StandardMaterial('groundMat', scene);
        groundMat.diffuseColor = new BABYLON.Color3(0.02, 0.02, 0.04); groundMat.specularColor = BABYLON.Color3.Black();
        const ground = BABYLON.MeshBuilder.CreateGround('ground', { width: groundSize, height: groundSize }, scene);
        ground.material = groundMat; ground.receiveShadows = true;
        const gridMat = new BABYLON.StandardMaterial('gridMat', scene);
        gridMat.emissiveColor = new BABYLON.Color3(0.05, 0.2, 0.2); gridMat.diffuseColor = BABYLON.Color3.Black(); gridMat.alpha = 0.3;
        const grid = BABYLON.MeshBuilder.CreateGround('grid', { width: groundSize, height: groundSize, subdivisions: 20 }, scene);
        grid.material = gridMat; grid.position.y = 0.05; grid.visibility = 0.6;
        const buildings = []; const buildingData = [];
        function createBuilding(type, x, z, state) {
            const group = new BABYLON.TransformNode('bldGroup', scene); group.position.set(x, 0, z);
            let mesh, height = 0, width = 0, depth = 0;
            let color = new BABYLON.Color3(0.5, 0.2, 0.6); let emissiveColor = new BABYLON.Color3(0.3, 0.1, 0.4);
            const makeMat = (d, e) => { const m = new BABYLON.StandardMaterial('bldMat', scene); m.diffuseColor = d; m.emissiveColor = e; m.specularColor = BABYLON.Color3.Black(); return m; };
            switch (type) {
                case 'house':
                    height = 2 + Math.random() * 1.5; width = 2 + Math.random() * 0.8; depth = 2 + Math.random() * 0.8;
                    color = new BABYLON.Color3(0.6, 0.3, 0.5); emissiveColor = new BABYLON.Color3(0.3, 0.05, 0.2);
                    const box = BABYLON.MeshBuilder.CreateBox('box', { width, height, depth }, scene); box.parent = group; box.position.y = height / 2;
                    const roof = BABYLON.MeshBuilder.CreateCylinder('roof', { diameterTop: 0, diameterBottom: width * 1.1, height: height * 0.4, tessellation: 4 }, scene);
                    roof.parent = group; roof.position.y = height + height * 0.2; roof.rotation.y = Math.PI / 4;
                    const matH = makeMat(color, emissiveColor); box.material = matH; roof.material = matH; mesh = box;
                    break;
                case 'apartment':
                    height = 4 + Math.random() * 3; width = 2.5 + Math.random() * 0.5; depth = 2.5 + Math.random() * 0.5;
                    color = new BABYLON.Color3(0.8, 0.3, 0.6); emissiveColor = new BABYLON.Color3(0.4, 0.1, 0.3);
                    const apt = BABYLON.MeshBuilder.CreateBox('apt', { width, height, depth }, scene); apt.position.y = height / 2; apt.parent = group;
                    const ant = BABYLON.MeshBuilder.CreateCylinder('ant', { diameterTop: 0.05, diameterBottom: 0.05, height: 0.6 }, scene);
                    ant.parent = group; ant.position.y = height + 0.3; const matA = makeMat(color, emissiveColor); apt.material = matA; ant.material = matA; mesh = apt;
                    break;
                case 'shop':
                    height = 2.5 + Math.random() * 1.5; width = 3 + Math.random() * 1; depth = 2 + Math.random() * 0.8;
                    color = new BABYLON.Color3(0.9, 0.7, 0.2); emissiveColor = new BABYLON.Color3(0.5, 0.3, 0.0);
                    const shop = BABYLON.MeshBuilder.CreateBox('shop', { width, height, depth }, scene); shop.position.y = height / 2; shop.parent = group;
                    const awning = BABYLON.MeshBuilder.CreateBox('awning', { width: width * 1.2, height: 0.1, depth: 0.8 }, scene);
                    awning.parent = group; awning.position.set(0, 0.8, depth / 2 + 0.4); const matS = makeMat(color, emissiveColor); shop.material = matS; awning.material = matS; mesh = shop;
                    break;
                case 'office':
                    height = 5 + Math.random() * 4; width = 2 + Math.random() * 0.6; depth = 2 + Math.random() * 0.6;
                    color = new BABYLON.Color3(0.2, 0.7, 0.8); emissiveColor = new BABYLON.Color3(0.0, 0.4, 0.5);
                    const off = BABYLON.MeshBuilder.CreateBox('off', { width, height, depth }, scene); off.position.y = height / 2; off.parent = group;
                    for (let i = 0; i < 3; i++) { const step = BABYLON.MeshBuilder.CreateBox('step', { width: width * (0.8 - i * 0.15), height: 0.3, depth: depth * (0.8 - i * 0.15) }, scene); step.parent = group; step.position.y = height + i * 0.3 + 0.15; }
                    const matO = makeMat(color, emissiveColor); off.material = matO; mesh = off;
                    break;
                case 'factory':
                    height = 3 + Math.random() * 2; width = 3 + Math.random() * 1.2; depth = 2.5 + Math.random() * 0.8;
                    color = new BABYLON.Color3(0.2, 0.5, 0.9); emissiveColor = new BABYLON.Color3(0.0, 0.2, 0.5);
                    const fac = BABYLON.MeshBuilder.CreateBox('fac', { width, height, depth }, scene); fac.position.y = height / 2; fac.parent = group;
                    const chimney = BABYLON.MeshBuilder.CreateCylinder('chim', { diameterTop: 0.2, diameterBottom: 0.3, height: 1.2 }, scene);
                    chimney.parent = group; chimney.position.set(width / 2 - 0.3, height + 0.6, depth / 2 - 0.3);
                    const matF = makeMat(color, emissiveColor); fac.material = matF; chimney.material = matF; mesh = fac;
                    break;
                case 'tower':
                    height = 7 + Math.random() * 5; width = 1.8 + Math.random() * 0.4; depth = 1.8 + Math.random() * 0.4;
                    color = new BABYLON.Color3(0.6, 0.2, 0.8); emissiveColor = new BABYLON.Color3(0.3, 0.0, 0.5);
                    const tower = BABYLON.MeshBuilder.CreateCylinder('tower', { diameterTop: width * 0.6, diameterBottom: width, height, tessellation: 12 }, scene);
                    tower.position.y = height / 2; tower.parent = group;
                    const cone = BABYLON.MeshBuilder.CreateCylinder('cone', { diameterTop: 0, diameterBottom: width * 0.8, height: 1.0, tessellation: 12 }, scene);
                    cone.parent = group; cone.position.y = height + 0.5; const matT = makeMat(color, emissiveColor); tower.material = matT; cone.material = matT; mesh = tower;
                    break;
                default:
                    mesh = BABYLON.MeshBuilder.CreateBox('default', { width: 2, height: 2, depth: 2 }, scene); mesh.position.y = 1; mesh.parent = group;
            }
            const bData = { mesh, group, type, state: state || { activityLevel: 0.5, healthLevel: 0.8, lastEvent: 'idle', pltScore: { profit: 0.5, love: 0.5, tax: 0.5 } }, label: null, infoPanel: null, position: { x, z } };
            buildingData.push(bData); buildings.push(mesh);
            const labelText = state?.subsystem || type;
            const label = (function() {
                const plane = BABYLON.MeshBuilder.CreatePlane('label', { size: 2 }, scene);
                plane.position.set(x, height + 0.8, z); plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL; plane.isPickable = false;
                const tex = new BABYLON.DynamicTexture('labelTex', { width: 256, height: 64 }, scene, true);
                const ctx = tex.getContext(); ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0, 0, 256, 64);
                ctx.font = 'bold 22px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10; ctx.fillStyle = '#aaccff'; ctx.fillText(labelText, 128, 34);
                tex.update();
                const matL = new BABYLON.StandardMaterial('labelMat', scene); matL.emissiveTexture = tex; matL.diffuseColor = BABYLON.Color3.Black(); plane.material = matL;
                return plane;
            })();
            bData.label = label;
            mesh.actionManager = new BABYLON.ActionManager(scene);
            mesh.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnPickTrigger, () => onBuildingClick(bData)));
            return bData;
        }
        function createLabel(text, pos, scene) {
            const plane = BABYLON.MeshBuilder.CreatePlane('label', { size: 2 }, scene);
            plane.position.copyFrom(pos); plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL; plane.isPickable = false;
            const tex = new BABYLON.DynamicTexture('lt', { width: 256, height: 64 }, scene, true);
            const ctx = tex.getContext(); ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0, 0, 256, 64);
            ctx.font = 'bold 16px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8; ctx.fillStyle = '#ccddff'; ctx.fillText(text, 128, 34);
            tex.update(); const m = new BABYLON.StandardMaterial('lm', scene); m.emissiveTexture = tex; m.diffuseColor = BABYLON.Color3.Black(); plane.material = m;
            return plane;
        }
        const citizens = [];
        function createCitizen(name, archetype, x, z) {
            const group = new BABYLON.TransformNode('citGroup', scene); group.position.set(x, 0, z);
            const body = BABYLON.MeshBuilder.CreateCylinder('body', { diameter: 0.3, height: 0.8 }, scene); body.parent = group; body.position.y = 0.4;
            const head = BABYLON.MeshBuilder.CreateSphere('head', { diameter: 0.25 }, scene); head.parent = group; head.position.y = 0.9;
            const aura = BABYLON.MeshBuilder.CreateSphere('aura', { diameter: 0.6 }, scene); aura.parent = group; aura.position.y = 0.5;
            const auraMat = new BABYLON.StandardMaterial('auraMat', scene); auraMat.emissiveColor = new BABYLON.Color3(0.3, 0.1, 0.5); auraMat.alpha = 0.15; aura.material = auraMat;
            let col = new BABYLON.Color3(0.6, 0.4, 0.8);
            switch (archetype) {
                case 'OBSERVER': col = new BABYLON.Color3(0.2, 0.5, 0.9); break;
                case 'EXPLORER': col = new BABYLON.Color3(0.2, 0.8, 0.6); break;
                case 'CREATOR': col = new BABYLON.Color3(0.9, 0.6, 0.1); break;
                case 'SAGE': col = new BABYLON.Color3(0.6, 0.2, 0.8); break;
                case 'MERCHANT': col = new BABYLON.Color3(0.9, 0.3, 0.4); break;
            }
            const bm = new BABYLON.StandardMaterial('bm', scene); bm.diffuseColor = col; bm.emissiveColor = col.scale(0.2); body.material = bm; head.material = bm;
            const thoughtText = createLabel('...', new BABYLON.Vector3(0, 1.6, 0), scene);
            thoughtText.parent = group; thoughtText.scaling = new BABYLON.Vector3(0.6, 0.4, 0.6); thoughtText.isPickable = false;
            const cd = { group, body, head, aura, thoughtText, name, archetype, position: { x, z }, target: null, speed: 0.02 + Math.random() * 0.02, idleTimer: 0, walkTimer: 0, thoughtTimer: 0, currentThought: '...' };
            citizens.push(cd); return cd;
        }
        function generateCity(gskState) {
            const spacing = 4.5; const cols = 6; const rows = 4;
            const offsetX = -(cols - 1) * spacing / 2; const offsetZ = -(rows - 1) * spacing / 2;
            const types = ['house', 'apartment', 'shop', 'office', 'factory', 'tower'];
            let idx = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = offsetX + c * spacing + (Math.random() - 0.5) * 0.5;
                    const z = offsetZ + r * spacing + (Math.random() - 0.5) * 0.5;
                    const type = types[(c + r) % types.length];
                    const state = gskState.buildings[idx % gskState.buildings.length] || null;
                    const bData = createBuilding(type, x, z, state);
                    if (state) state.position = { x, z };
                    idx++;
                }
            }
            const names = ['Aria', 'Kael', 'Nyx', 'Orion', 'Vesper', 'Zephyr', 'Luna', 'Sol', 'Iris', 'Atlas', 'Nova', 'Echo'];
            const archs = ['OBSERVER', 'EXPLORER', 'CREATOR', 'SAGE', 'MERCHANT'];
            for (let i = 0; i < 12; i++) {
                const x = (Math.random() - 0.5) * 30; const z = (Math.random() - 0.5) * 30;
                createCitizen(names[i % names.length] + (i > 7 ? ` ${i}` : ''), archs[i % archs.length], x, z);
            }
        }
        let selectedBuilding = null;
        function onBuildingClick(bData) {
            if (selectedBuilding === bData) { hideInfoPanel(); selectedBuilding = null; return; }
            hideInfoPanel();
            const state = bData.state; const pos = bData.group.position;
            const height = bData.mesh.getBoundingInfo().boundingBox.maximum.y;
            const panel = BABYLON.MeshBuilder.CreatePlane('panel', { size: 2.5 }, scene);
            panel.position.set(pos.x + 2.0, height / 2 + 0.5, pos.z);
            panel.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL; panel.isPickable = false;
            const tex = new BABYLON.DynamicTexture('pt', { width: 512, height: 320 }, scene, true);
            const ctx = tex.getContext();
            ctx.fillStyle = 'rgba(8,8,12,0.85)'; ctx.fillRect(0, 0, 512, 320);
            ctx.strokeStyle = '#8B5CF6'; ctx.lineWidth = 2; ctx.strokeRect(2, 2, 508, 316);
            ctx.font = 'bold 22px Inter'; ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            ctx.fillText(`✦ ${state?.subsystem || 'Building'}`, 20, 20);
            ctx.font = '18px Inter'; ctx.fillStyle = '#aaa';
            ctx.fillText(`Activity: ${(state?.activityLevel || 0.5).toFixed(2)}`, 20, 60);
            ctx.fillText(`Health: ${(state?.healthLevel || 0.8).toFixed(2)}`, 20, 90);
            ctx.fillText(`Last Event: ${state?.lastEvent || 'idle'}`, 20, 120);
            ctx.fillStyle = '#888'; ctx.font = '16px Inter';
            const plt = state?.pltScore || { profit: 0.5, love: 0.5, tax: 0.5 };
            ctx.fillText(`PLT: P=${plt.profit.toFixed(2)} L=${plt.love.toFixed(2)} T=${plt.tax.toFixed(2)}`, 20, 160);
            tex.update();
            const matP = new BABYLON.StandardMaterial('pm', scene); matP.emissiveTexture = tex; matP.diffuseColor = BABYLON.Color3.Black(); panel.material = matP;
            bData.infoPanel = panel; selectedBuilding = bData;
            setTimeout(() => { if (panel && panel.material) { panel.dispose(); if (selectedBuilding === bData) selectedBuilding = null; } }, 10000);
        }
        function hideInfoPanel() {
            if (selectedBuilding && selectedBuilding.infoPanel) { selectedBuilding.infoPanel.dispose(); selectedBuilding.infoPanel = null; selectedBuilding = null; }
            scene.meshes.forEach(m => { if (m.name === 'panel') m.dispose(); });
        }
        let pltTimer = 0;
        function updatePLT() {
            const col = PLT.getDominantColor(); const rgb = (c => { const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(c); return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : { r:255,g:255,b:255 }; })(col);
            if (grid.material) grid.material.emissiveColor = new BABYLON.Color3(rgb.r/255, rgb.g/255, rgb.b/255);
            buildingData.forEach(b => {
                const act = b.state?.activityLevel || 0.5; const health = b.state?.healthLevel || 0.8;
                const mat = b.mesh.material;
                if (mat) {
                    const scale = 0.3 + act * 0.7;
                    mat.emissiveColor = new BABYLON.Color3(0.3, 0.1, 0.4).scale(scale);
                    mat.emissiveIntensity = 0.5 + act * 0.5 * (0.8 + Math.sin(Date.now() * 0.001 * (0.5 + health * 0.5)) * 0.2);
                }
            });
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') { isFirstPerson = !isFirstPerson;
                if (isFirstPerson) { const p = camera.position.clone(); fpCamera.position.copyFrom(p); fpCamera.setTarget(new BABYLON.Vector3(0,0,0)); camera.detachControl(canvas); fpCamera.attachControl(canvas,true); fpCamera.setEnabled(true); camera.setEnabled(false); document.getElementById('game-mode').textContent='🚶 FIRST PERSON'; canvas.requestPointerLock(); }
                else { const p = fpCamera.position.clone(); camera.position.copyFrom(p); camera.setTarget(new BABYLON.Vector3(0,0,0)); fpCamera.detachControl(canvas); fpCamera.setEnabled(false); camera.attachControl(canvas,true); camera.setEnabled(true); document.getElementById('game-mode').textContent='⚡ ORBIT'; document.exitPointerLock(); } }
            if (e.key === '`') { const t = document.getElementById('terminal'); t.classList.toggle('active'); if (t.classList.contains('active')) document.getElementById('terminal-input').focus(); }
        });
        document.getElementById('terminal-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { const v = e.target.value; if (v.trim()) { document.getElementById('terminal-log').innerHTML += `<div class="line">> ${v}</div>`; const p = v.toLowerCase().split(' ')[0]; const log = document.getElementById('terminal-log'); if (p === 'help') log.innerHTML += '<div class="line">Commands: help, status, citizens, buildings, plt, clear</div>'; else if (p === 'status') log.innerHTML += `<div class="line">PLT: P=${PLT.profit.toFixed(2)} L=${PLT.love.toFixed(2)} T=${PLT.tax.toFixed(2)} | Buildings: ${buildingData.length} | Citizens: ${citizens.length}</div>`; else if (p === 'citizens') citizens.forEach(c => log.innerHTML += `<div class="line">${c.name} (${c.archetype}): ${c.currentThought}</div>`); else if (p === 'buildings') buildingData.forEach(b => log.innerHTML += `<div class="line">${b.type}: ${b.state?.subsystem||'unknown'}</div>`); else if (p === 'plt') log.innerHTML += `<div class="line">P: ${PLT.profit.toFixed(2)} L: ${PLT.love.toFixed(2)} T: ${PLT.tax.toFixed(2)}</div>`; else if (p === 'clear') document.getElementById('terminal-log').innerHTML = ''; else log.innerHTML += `<div class="line">Unknown: ${v}</div>`; document.getElementById('terminal-log').scrollTop = document.getElementById('terminal-log').scrollHeight; e.target.value = ''; } }
        });
        let onboardStep = 0;
        const onboardMsgs = [
            { t: '✦ Welcome to the Dark City', d: "You are walking through GSK's consciousness. Every building is a subsystem. Every citizen is a thought." },
            { t: '⚡ Interact', d: 'Click any building to see its GSK state. Press V to toggle first-person view. Press ` to open the terminal.' },
            { t: '🧠 The City is Alive', d: "PLT (Profit, Love, Tax) drives the city's color and mood. Watch the grid pulse. Feel the consciousness." }
        ];
        function showOnboarding(s) {
            document.getElementById('onboarding').classList.add('active');
            document.getElementById('onboardTitle').textContent = onboardMsgs[s].t;
            document.getElementById('onboardDesc').textContent = onboardMsgs[s].d;
            document.querySelectorAll('#stepDots span').forEach((d, i) => d.classList.toggle('active', i === s));
            document.getElementById('onboardBtn').textContent = s === 2 ? 'Enter the City' : 'Next';
        }
        document.getElementById('onboardBtn').addEventListener('click', () => { if (onboardStep < 2) { onboardStep++; showOnboarding(onboardStep); } else document.getElementById('onboarding').classList.remove('active'); });
        const gsk = new GSKState();
        gsk.onUpdate((d) => { if (d.payload.buildings) d.payload.buildings.forEach(ns => { const m = buildingData.find(b => b.state && b.state.id === ns.id); if (m) m.state = ns; }); });
        generateCity(gsk);
        let elapsedTime = 0;
        engine.runRenderLoop(() => {
            const delta = engine.getDeltaTime(); elapsedTime += delta;
            citizens.forEach(c => {
                if (!c.target || Math.random() < 0.001) { const a = Math.random() * Math.PI * 2; const d = 3 + Math.random() * 8; c.target = { x: c.position.x + Math.cos(a) * d, z: c.position.z + Math.sin(a) * d }; c.target.x = Math.max(-19, Math.min(19, c.target.x)); c.target.z = Math.max(-19, Math.min(19, c.target.z)); }
                if (c.target) { const dx = c.target.x - c.position.x; const dz = c.target.z - c.position.z; const dist = Math.sqrt(dx*dx+dz*dz); if (dist > 0.1) { const s = c.speed * delta * 60; c.position.x += (dx/dist)*s; c.position.z += (dz/dist)*s; c.group.rotation.y = Math.atan2(dx,dz); } else c.target = null; }
                c.group.position.x = c.position.x; c.group.position.z = c.position.z;
                c.thoughtTimer += delta;
                if (c.thoughtTimer > 5 + Math.random() * 3) {
                    c.thoughtTimer = 0; c.currentThought = ['Wandering...','Seeking truth','Building something','Remembering','Connecting','Observing','Dreaming'][Math.floor(Math.random()*7)];
                    const ct = c.thoughtText; if (ct && ct.material && ct.material.emissiveTexture) { const ctx = ct.material.emissiveTexture.getContext(); ctx.clearRect(0,0,256,64); ctx.fillStyle='rgba(0,0,0,0)'; ctx.fillRect(0,0,256,64); ctx.font='bold 16px Inter'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=8; ctx.fillStyle='#ccddff'; ctx.fillText(c.currentThought,128,34); ct.material.emissiveTexture.update(); }
                }
            });
            pltTimer += delta;
            if (pltTimer > 2000) { pltTimer = 0; updatePLT(); }
            buildingData.forEach(b => { if (b.label && b.state && Math.random() < 0.001) { const tex = b.label.material.emissiveTexture; if (tex) { const ctx = tex.getContext(); ctx.clearRect(0,0,256,64); ctx.fillStyle='rgba(0,0,0,0)'; ctx.fillRect(0,0,256,64); ctx.font='bold 16px Inter'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=10; ctx.fillStyle='#aaccff'; ctx.fillText(b.state.subsystem||b.type,128,30); ctx.font='12px Inter'; ctx.fillStyle='#88aadd'; ctx.fillText(b.state.lastEvent||'',128,52); tex.update(); } } });
            scene.render();
        });
        window.addEventListener('resize', () => engine.resize());
        setTimeout(() => { document.getElementById('loading').classList.add('hidden'); setTimeout(() => showOnboarding(0), 500); }, 1500);
        console.log('✦ Dark City — GSK Consciousness Engine Active');
    </script>
