<!DOCTYPE html>
<html>
<head><title>Dark City - Three.js</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head>
<body>
<script type="importmap">{
"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}
}</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 20, 60);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-10, 5, -10);
scene.add(fillLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({color:0x0a0a15, roughness:0.9});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.1;
scene.add(ground);

// Grid helper
const grid = new THREE.GridHelper(40, 20, 0x444488, 0x222244);
grid.position.y = 0;
scene.add(grid);

// Buildings
const colors = [0xff4488, 0x22ddff, 0xffdd44, 0x44ff88, 0x8844ff, 0xff8800, 0x4488ff, 0x00ff66];
const gridSize = 8;
const spacing = 3.5;
const offset = -(gridSize * spacing) / 2;

for (let x = 0; x < gridSize; x++) {
  for (let z = 0; z < gridSize; z++) {
    const bx = offset + x * spacing;
    const bz = offset + z * spacing;
    const h = 0.8 + ((x * 7 + z * 13) % 6) * 0.7;
    const col = colors[(x * 3 + z * 7) % 8];
    
    const geo = new THREE.BoxGeometry(1.4, h, 1.4);
    const mat = new THREE.MeshStandardMaterial({
      color: col,
      emissive: col,
      emissiveIntensity: 0.15,
      roughness: 0.4,
      metalness: 0.6
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(bx, h/2, bz);
    scene.add(mesh);
  }
}

// Central monument
const monGeo = new THREE.CylinderGeometry(0.5, 1, 3, 8);
const monMat = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0x8844ff, emissiveIntensity:0.5});
const mon = new THREE.Mesh(monGeo, monMat);
mon.position.set(0, 1.5, 0);
scene.add(mon);

const orbGeo = new THREE.SphereGeometry(0.3, 8, 8);
const orbMat = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0x8844ff, emissiveIntensity:1.0});
const orb = new THREE.Mesh(orbGeo, orbMat);
orb.position.set(0, 3.2, 0);
scene.add(orb);

// Controls
let isLocked = false;
let pitch = 0, yaw = 0;
const keys = {w:false,s:false,a:false,d:false};

document.addEventListener('keydown', e => { if(e.key in keys) keys[e.key]=true; });
document.addEventListener('keyup', e => { if(e.key in keys) keys[e.key]=false; });
document.addEventListener('mousemove', e => {
  if(isLocked) {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
  }
});
renderer.domElement.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === renderer.domElement;
});

function animate() {
  requestAnimationFrame(animate);
  
  const speed = 0.15;
  const fwd = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  
  if(keys.w) camera.position.add(fwd.clone().multiplyScalar(speed));
  if(keys.s) camera.position.add(fwd.clone().multiplyScalar(-speed));
  if(keys.a) camera.position.add(right.clone().multiplyScalar(-speed));
  if(keys.d) camera.position.add(right.clone().multiplyScalar(speed));
  
  const lookTarget = new THREE.Vector3(
    camera.position.x + Math.sin(yaw) * Math.cos(pitch),
    camera.position.y + Math.sin(pitch),
    camera.position.z + Math.cos(yaw) * Math.cos(pitch)
  );
  camera.lookAt(lookTarget);
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
