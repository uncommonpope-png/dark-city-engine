<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Dark City Engine</title>
<style>body{margin:0;overflow:hidden;background:#000;font-family:monospace}
#info{position:fixed;bottom:10px;left:10px;color:#888;font-size:12px;z-index:10;background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:4px;pointer-events:none}
#error{position:fixed;top:10px;left:10px;right:10px;color:#ff4444;font-size:14px;z-index:10;background:rgba(0,0,0,0.8);padding:12px;border-radius:4px;white-space:pre-wrap;display:none}
canvas{display:block}
</style></head>
<body>
<div id="error"></div>
<div id="info">Dark City Engine | Click canvas to look | WASD to move</div>
<canvas id="dark_city_canvas"></canvas>
<script type="module">
const errDiv = document.getElementById('error');
function showError(msg) {
  errDiv.style.display = 'block';
  errDiv.textContent += msg + '\n';
}

// Check WebGPU before loading WASM
if (!navigator.gpu) {
  showError('WebGPU NOT AVAILABLE. Use Chrome 113+ or Edge 113+.');
} else {
  showError('WebGPU detected. Loading engine...');
}

// Resize canvas
const canvas = document.getElementById('dark_city_canvas');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Catch all errors
window.addEventListener('error', (e) => {
  showError('JS: ' + e.message);
});

// Load WASM engine
(async () => {
  try {
    const mod = await import('./pkg/dark_city_engine.js');
    showError('WASM loaded. Initializing...');
    await mod.default();
    showError('Engine running!');
  } catch(e) {
    showError('Engine failed: ' + e.message);
    if(e.stack) showError(e.stack);
  }
})();
</script>
</body>
</html>
