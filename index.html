<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>? Dark City — GSK Consciousness</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#fff;overflow:hidden;height:100vh;width:100vw;font-family:Inter,sans-serif}
canvas{display:block}
#loading{position:fixed;inset:0;z-index:1000;background:#08080e;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.2s}
#loading.hidden{opacity:0;pointer-events:none}
#loading .spinner{width:60px;height:60px;border:3px solid rgba(139,92,246,0.08);border-top:3px solid #8B5CF6;border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:20px;color:#666;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase}
#terminal{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:80%;max-width:820px;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);border:1px solid rgba(139,92,246,.15);border-radius:14px;padding:16px 22px;color:#b0f0b0;font-family:"Courier New",monospace;font-size:.85rem;z-index:200;display:none;max-height:320px;overflow-y:auto;box-shadow:0 0 80px rgba(0,0,0,.7)}
#terminal.active{display:block}
#terminal .line{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.02)}
#terminal .input-line{display:flex;gap:8px;margin-top:6px}
#terminal .input-line input{flex:1;background:transparent;border:none;color:#b0f0b0;font-family:inherit;font-size:inherit;outline:none}
#onboarding{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.78);backdrop-filter:blur(18px);display:none;align-items:center;justify-content:center}
#onboarding.active{display:flex}
#onboarding .card{max-width:460px;background:rgba(14,14,22,.92);border:1px solid rgba(139,92,246,.12);border-radius:28px;padding:36px 40px;color:#ddd;box-shadow:0 0 80px rgba(139,92,246,.04)}
#onboarding .card h2{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#8B5CF6,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#onboarding .card p{font-size:.95rem;line-height:1.7;color:#aaa;margin:12px 0 22px}
#onboarding .card .step-dots{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
#onboarding .card .step-dots span{width:8px;height:8px;border-radius:50%;background:#2a2a3a;transition:.3s}
#onboarding .card .step-dots span.active{background:#8B5CF6;width:24px;border-radius:4px}
#onboarding .card button{background:linear-gradient(135deg,#8B5CF6,#6D28D9);border:none;color:#fff;padding:11px 26px;border-radius:30px;font-weight:600;cursor:pointer;transition:.25s;width:100%}
#game-mode{position:fixed;bottom:22px;left:22px;z-index:50;color:rgba(255,255,255,.15);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;pointer-events:none}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>? Dark City — Initializing GSK Consciousness</p></div>
<div id="onboarding"><div class="card"><div class="step-dots" id="stepDots"><span class="active"></span><span></span><span></span></div><h2 id="onboardTitle">? Dark City</h2><p id="onboardDesc">You are walking through GSK consciousness.</p><button id="onboardBtn">Enter the City</button></div></div>
<div id="terminal"><div id="terminal-log"></div><div class="input-line"><span style="color:#8B5CF6">$</span><input id="terminal-input" type="text" placeholder="help" autofocus /></div></div>
<div id="game-mode">? ORBIT</div>
<canvas id="renderCanvas"></canvas>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script>
const PLT={profit:.55,love:.45,tax:.50,colors:{profit:"#FFB347",love:"#FF6B9D",tax:"#4ECDC4"},get dominant(){const p=this.profit,l=this.love,t=this.tax;return p>l&&p>t?"profit":l>p&&l>t?"love":"tax"},hexToRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?{r:parseInt(r[1],16)/255,g:parseInt(r[2],16)/255,b:parseInt(r[3],16)/255}:{r:.5,g:.5,b:.5}},getMoonColor(){const p=this.profit,l=this.love,t=this.tax;if((p+l+t)/3<.25)return new BABYLON.Color3(.3,.3,.35);if(p>.7&&p>l&&p>t)return new BABYLON.Color3(1,.7,.28);if(l>.7&&l>p&&l>t)return new BABYLON.Color3(1,.42,.62);if(t>.7&&t>p&&t>l)return new BABYLON.Color3(.31,.8,.77);return new BABYLON.Color3(.85,.85,.95)}};
const canvas=document.getElementById("renderCanvas"),engine=new BABYLON.Engine(canvas,true,{preserveDrawingBuffer:true,stencil:true});
const scene=new BABYLON.Scene(engine);scene.fogMode=BABYLON.Scene.FOGMODE_EXP;scene.fogDensity=.0035;scene.fogColor=new BABYLON.Color3(.04,.015,.07);
const camera=new BABYLON.ArcRotateCamera("cam",-Math.PI/3,Math.PI/4.5,70,BABYLON.Vector3.Zero(),scene);
camera.attachControl(canvas,true);camera.lowerRadiusLimit=8;camera.upperRadiusLimit=130;
const ambient=new BABYLON.HemisphericLight("ambient",new BABYLON.Vector3(0,1,0),scene);ambient.intensity=.22;ambient.diffuse=new BABYLON.Color3(.25,.12,.45);
const dirLight=new BABYLON.DirectionalLight("dir",new BABYLON.Vector3(1,.8,.4),scene);dirLight.intensity=.5;
const gMat=new BABYLON.StandardMaterial("gm",scene);gMat.diffuseColor=new BABYLON.Color3(.02,.02,.04);
const grd=BABYLON.MeshBuilder.CreateGround("grd",{width:70,height:70},scene);grd.material=gMat;
const gridMat=new BABYLON.StandardMaterial("gridm",scene);gridMat.emissiveColor=new BABYLON.Color3(.04,.15,.2);gridMat.alpha=.25;
const grid=BABYLON.MeshBuilder.CreateGround("grid",{width:70,height:70,subdivisions:24},scene);grid.material=gridMat;grid.position.y=.08;
function makePyr(x,z,sz,col,lbl){const g=new BABYLON.TransformNode("g",scene);g.position.set(x,0,z);const geo=new BABYLON.CylinderBuilder("p",{diameterTop:0,diameterBottom:sz,height:sz*1.2,tessellation:4});const m=new BABYLON.StandardMaterial("pm",scene);m.diffuseColor=col;m.emissiveColor=col.scale(.2);const mesh=new BABYLON.Mesh(geo,scene);mesh.position.y=sz*.6;mesh.material=m;mesh.parent=g;mesh.isPickable=true;const e=new BABYLON.EdgesBuilder("e",mesh);const em=e.build();em.parent=g;const emat=new BABYLON.StandardMaterial("em",scene);emat.emissiveColor=new BABYLON.Color3(.5,.3,.8);emat.alpha=.3;em.material=emat;return mesh}
function makeZig(x,z,sz,col){const g=new BABYLON.TransformNode("g",scene);g.position.set(x,0,z);let y=0;for(let i=0;i<6;i++){const t=i/6,w=sz*(1-t*.7);const b=BABYLON.MeshBuilder.CreateBox("z"+i,{width:w,height:sz/6,depth:w},scene);b.position.y=y+sz/12;b.parent=g;const m=new BABYLON.StandardMaterial("zm"+i,scene);m.diffuseColor=col.scale(1-t*.3);m.emissiveColor=col.scale(.15);b.material=m;y+=sz/6}return g}
function makeLbl(text,x,y,z){const pl=BABYLON.MeshBuilder.CreatePlane("lbl",{size:2},scene);pl.position.set(x,y,z);pl.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL;pl.isPickable=false;const c=document.createElement("canvas");c.width=256;c.height=64;const cx=c.getContext("2d");cx.fillStyle="rgba(0,0,0,0)";cx.fillRect(0,0,256,64);cx.font="bold 20px Inter";cx.textAlign="center";cx.textBaseline="middle";cx.shadowColor="rgba(0,0,0,.9)";cx.shadowBlur=8;cx.fillStyle="#ccddff";cx.fillText(text,128,32);const tex=new BABYLON.Texture(c.toDataURL(),scene);const m=new BABYLON.StandardMaterial("lm",scene);m.emissiveTexture=tex;m.diffuseColor=BABYLON.Color3.Black();pl.material=m;return pl}
const pyr1=makePyr(0,-3,5,new BABYLON.Color3(.5,.3,.7),"? Great Pyramid");
const pyr2=makePyr(-12,-6,3.5,new BABYLON.Color3(.4,.2,.6),"? Ziggurat");
const zig1=makeZig(12,-6,3.5,new BABYLON.Color3(.5,.2,.6));
makeLbl("? Ziggurat",12,-4,3);
makeLbl("? Great Pyramid",0,1,-3);
makeLbl("? Dark City",0,8,0);
makeLbl("? Obelisk",18,-2,5);
makeLbl("? The Arch",0,6,-18);
makeLbl("? Observatory",-14,8,8);
setTimeout(()=>{document.getElementById("loading").classList.add("hidden");document.getElementById("onboarding").classList.add("active")},1800);
engine.runRenderLoop(()=>scene.render());
window.addEventListener("resize",()=>engine.resize());
</script>
</body>
</html>
